<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>DataVista Dashboard</title>

<!-- Google Font -->
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>

/* ===============================
   GLOBAL RESET & BASE STYLES
================================ */
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:'Poppins',sans-serif;
}

body{
  background:#020617;
  color:white;
  display:flex;
  height:100vh;
  overflow:hidden;
}

/* ===============================
   ANIMATED BACKGROUND GLOW
================================ */
body::before,
body::after{
  content:'';
  position:fixed;
  width:600px;
  height:600px;
  opacity:0.4;
  animation:float 10s infinite alternate;
}

/* Top glow */
body::before{
  background:radial-gradient(circle,#6366f1,transparent);
  top:-200px;
  left:-200px;
}

/* Bottom glow */
body::after{
  background:radial-gradient(circle,#38bdf8,transparent);
  bottom:-200px;
  right:-200px;
  animation-duration:12s;
}

/* Floating animation */
@keyframes float{
  0%{transform:translateY(0)}
  100%{transform:translateY(80px)}
}

/* ===============================
   SIDEBAR
================================ */
.sidebar{
  width:260px;
  background:rgba(255,255,255,0.04);
  backdrop-filter:blur(20px);
  border-right:1px solid rgba(255,255,255,0.08);
  padding:30px;
  display:flex;
  flex-direction:column;
  gap:35px;
}

/* Logo */
.logo{
  font-size:26px;
  font-weight:700;
  background:linear-gradient(90deg,#38bdf8,#6366f1,#22c55e);
  -webkit-background-clip:text;
  color:transparent;
}

/* Navigation menu */
.menu{
  display:flex;
  flex-direction:column;
  gap:14px;
}

.menu a{
  text-decoration:none;
  color:#cbd5f5;
  padding:12px;
  border-radius:10px;
  transition:0.3s;
}

/* Hover effect */
.menu a:hover{
  background:linear-gradient(90deg,#6366f1,#38bdf8);
  color:white;
  transform:translateX(8px);
  box-shadow:0 0 15px rgba(99,102,241,0.6);
}

/* ===============================
   MAIN CONTENT AREA
================================ */
.main{
  flex:1;
  padding:35px;
  overflow:auto;
}

/* ===============================
   TOP BAR
================================ */
.topbar{
  display:flex;
  justify-content:space-between;
  margin-bottom:30px;
}

/* Search input */
.search{
  background:rgba(255,255,255,0.08);
  border:none;
  padding:12px 16px;
  border-radius:12px;
  color:white;
  width:260px;
}

/* Profile badge */
.profile{
  background:linear-gradient(90deg,#6366f1,#38bdf8);
  padding:10px 20px;
  border-radius:12px;
  box-shadow:0 0 15px rgba(99,102,241,0.7);
}

/* ===============================
   STAT CARDS
================================ */
.cards{
  display:grid;
  grid-template-columns:repeat(4,1fr);
  gap:20px;
  margin-bottom:30px;
}

.card{
  background:rgba(255,255,255,0.05);
  border:1px solid rgba(255,255,255,0.08);
  padding:25px;
  border-radius:18px;
  transition:0.4s;
  position:relative;
  overflow:hidden;
}

/* Card hover animation */
.card:hover{
  transform:translateY(-10px) scale(1.04);
  box-shadow:0 20px 50px rgba(0,0,0,0.7);
}

.card h3{
  font-size:14px;
  color:#94a3b8;
}

.card h1{
  margin-top:12px;
  font-size:32px;
}

/* Neon strip at bottom */
.card::after{
  content:'';
  position:absolute;
  height:4px;
  width:100%;
  bottom:0;
  left:0;
  background:linear-gradient(90deg,#38bdf8,#6366f1,#22c55e);
}

/* ===============================
   CHART SECTION
================================ */
.charts{
  display:grid;
  grid-template-columns:2fr 1fr;
  gap:20px;
  margin-bottom:30px;
}

.chart-box{
  background:rgba(255,255,255,0.05);
  border:1px solid rgba(255,255,255,0.08);
  padding:25px;
  border-radius:18px;
}

/* ===============================
   BAR CHART
================================ */
.bar-chart{
  display:flex;
  align-items:flex-end;
  gap:18px;
  height:220px;
  margin-top:20px;
}

.bar{
  flex:1;
  background:linear-gradient(180deg,#38bdf8,#6366f1);
  border-radius:8px;
  animation:grow 1.5s ease;
  transition:0.3s;
  box-shadow:0 0 12px rgba(56,189,248,0.7);
}

/* Hover effect */
.bar:hover{
  transform:scaleY(1.15);
  box-shadow:0 0 20px #38bdf8;
}

/* Animation */
@keyframes grow{
  0%{height:0}
}

/* Individual bar heights */
.b1{height:50%}
.b2{height:80%}
.b3{height:60%}
.b4{height:95%}
.b5{height:70%}
.b6{height:85%}

/* ===============================
   DONUT CHART
================================ */
.donut{
  width:170px;
  height:170px;
  border-radius:50%;
  background:conic-gradient(
    #38bdf8 0% 40%,
    #6366f1 40% 65%,
    #22c55e 65% 85%,
    #f59e0b 85% 100%
  );
  margin:auto;
  margin-top:20px;
  position:relative;
  box-shadow:0 0 25px rgba(99,102,241,0.7);
}

/* Inner circle */
.donut::after{
  content:'';
  position:absolute;
  width:90px;
  height:90px;
  background:#020617;
  border-radius:50%;
  top:50%;
  left:50%;
  transform:translate(-50%,-50%);
}

/* ===============================
   TABLE
================================ */
.table{
  background:rgba(255,255,255,0.05);
  border:1px solid rgba(255,255,255,0.08);
  padding:25px;
  border-radius:18px;
}

table{
  width:100%;
  border-collapse:collapse;
  margin-top:10px;
}

th,td{
  padding:14px;
  font-size:14px;
}

th{
  color:#94a3b8;
  text-align:left;
}

tr{
  border-bottom:1px solid rgba(255,255,255,0.06);
}

/* Row hover */
tr:hover{
  background:rgba(255,255,255,0.06);
}

/* Status badges */
.status{
  padding:5px 12px;
  border-radius:20px;
  font-size:12px;
}

.active{
  background:#22c55e;
}

.pending{
  background:#f59e0b;
}

</style>
</head>

<body>

<!-- ===============================
     SIDEBAR
================================ -->
<div class="sidebar">
  <div class="logo">DataVista</div>

  <div class="menu">
    <a href="#">Dashboard</a>
    <a href="#">Analytics</a>
    <a href="#">Users</a>
    <a href="#">Reports</a>
    <a href="#">Revenue</a>
    <a href="#">Settings</a>
  </div>
</div>

<!-- ===============================
     MAIN CONTENT
================================ -->
<div class="main">

  <!-- Topbar -->
  <div class="topbar">
    <input class="search" placeholder="Search dashboard...">
    <div class="profile">Admin</div>
  </div>

  <!-- Cards -->
  <div class="cards">
    <div class="card">
      <h3>Total Users</h3>
      <h1>32,540</h1>
    </div>

    <div class="card">
      <h3>Revenue</h3>
      <h1>$182K</h1>
    </div>

    <div class="card">
      <h3>Orders</h3>
      <h1>18,920</h1>
    </div>

    <div class="card">
      <h3>Growth</h3>
      <h1>+46%</h1>
    </div>
  </div>

  <!-- Charts -->
  <div class="charts">

    <!-- Bar Chart -->
    <div class="chart-box">
      <h3>Monthly Sales</h3>
      <div class="bar-chart">
        <div class="bar b1"></div>
        <div class="bar b2"></div>
        <div class="bar b3"></div>
        <div class="bar b4"></div>
        <div class="bar b5"></div>
        <div class="bar b6"></div>
      </div>
    </div>

    <!-- Donut Chart -->
    <div class="chart-box">
      <h3>Traffic</h3>
      <div class="donut"></div>
    </div>

  </div>

  <!-- Table -->
  <div class="table">
    <h3>Recent Users</h3>

    <table>
      <tr>
        <th>Name</th>
        <th>Email</th>
        <th>Status</th>
      </tr>

      <tr>
        <td>surya</td>
        <td>suryajothika@mail.com</td>
        <td><span class="status active">Active</span></td>
      </tr>

      <tr>
        <td>simbu</td>
        <td>singleboy@mail.com</td>
        <td><span class="status pending">Pending</span></td>
      </tr>

      <tr>
        <td>dhanush</td>
        <td>asurandanush@mail.com</td>
        <td><span class="status active">Active</span></td>
      </tr>
    </table>
  </div>

</div>

</body>
</html>
